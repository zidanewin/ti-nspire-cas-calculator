<html>
<head>
    <title>TI-Nspire CX II Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .graph-display { border: 1px solid black; height: 300px; margin-bottom: 10px; }
        .menu-buttons { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .key { border: 1px solid black; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="graph-display">Graphing Display</div>
    <div class="menu-buttons">
        <button>Menu 1</button>
        <button>Menu 2</button>
        <button>Menu 3</button>
    </div>
    <div class="keypad">
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
        <div class="key">+</div>
        <div class="key">4</div>
        <div class="key">5</div>
        <div class="key">6</div>
        <div class="key">-</div>
        <div class="key">7</div>
        <div class="key">8</div>
        <div class="key">9</div>
        <div class="key">×</div>
        <div class="key">0</div>
        <div class="key">.</div>
        <div class="key">=</div>
        <div class="key">÷</div>
    </div>
</body>
</html>
